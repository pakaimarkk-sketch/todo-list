<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
</head>
<body>
    <div id="mainContainer">
        <div id="navbar">
            <div id="navLogo">Logo</div>

            <div id="navDay"> 
                <div>
                    <button type="button" id="day">Today</button>
                </div>

                <div>
                    <button type="button" id="week">Week</button>
                </div>

                <div>
                    <button type="button" id="month">Month</button>
                </div>
                <div>
                    <button type="button" id="notes">Notes</button>
                </div>
            </div>

            

            <div id="navProjects">
                <button type="button" id="addProjects">Add Project</button>

            </div>
            
        </div>

        <div id="main">
            <header><p>To-Do List</p></header>
            <div id="todo"></div>
            
            <footer id="mainFooter">Made by: Mark Pakai</footer>
        </div>
    </div>
</body>
</html>
