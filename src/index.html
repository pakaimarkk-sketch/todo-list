<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
</head>
<body>
    <div id="mainContainer">
    <aside id="navbar">
        <div class="sidebar-section sidebar-brand">
        <div id="navLogo">
        <span class="logo-title">TaskFlow</span>
    </div>
        </div>

        <div class="sidebar-section">
            <p class="sidebar-label">Planning</p>
            <div id="navDay" class="sidebar-nav">
                <button type="button" id="day" class="btn btn-secondary">Today</button>
                <button type="button" id="week" class="btn btn-secondary">Week</button>
                <button type="button" id="month" class="btn btn-secondary">Month</button>
            </div>
        </div>

        <div class="sidebar-section">
            <p class="sidebar-label">Workspace</p>
            <div class="sidebar-nav">
                <button type="button" id="notes" class="btn btn-secondary">Notes</button>
            </div>
        </div>

        <div class="sidebar-section sidebar-projects">
            <div class="sidebar-section-header">
                <p class="sidebar-label">Projects</p>
            </div>

            <div id="navProjects" class="sidebar-nav">
                <button type="button" id="addProjects" class="btn btn-primary">Add Project</button>
                <div id="projectsList"></div>
            </div>
        </div>
    </aside>

        <div id="main">
            <header><p>To-Do List</p></header>
            <div id="todo"></div>
            
            <footer id="mainFooter">Made by: Mark Pakai</footer>
        </div>
    </div>
</body>
</html>
